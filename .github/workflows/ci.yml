name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean install

      - name: Test with Maven
        run: mvn test

      - name: Generate JaCoCo Report
        run: mvn jacoco:report

      # JaCoCo report (XML + CSV + HTML) wird als Artifact gespeichert,
      # damit der jacoco-badge Job darauf zugreifen kann
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  jacoco-badge:
    runs-on: ubuntu-latest
    needs: build
    # Badges nur auf Push committen, nicht auf PRs (keine Write-Rechte bei Forks)
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download JaCoCo Report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # Generiert jacoco.svg und branches.svg aus jacoco.csv und speichert
      # sie unter .github/badges/
      - name: Generate JaCoCo Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: target/site/jacoco/jacoco.csv

      - name: Commit and push badges
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: 'ci: update JaCoCo coverage badges'
          add: '.github/badges/*.svg'
